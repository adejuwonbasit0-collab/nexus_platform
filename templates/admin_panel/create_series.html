{% extends 'admin_panel/base_admin.html' %}
{% block title %}Create Series{% endblock %}
{% block admin_content %}
<h1 style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:24px;">📺 Create New Series</h1>
<div class="card" style="padding:32px;max-width:600px;">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Series Title *</label>
      <input type="text" name="title" class="form-input" required placeholder="Series name">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-textarea" placeholder="Series synopsis..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Thumbnail / Cover Poster</label>
      <input type="file" name="thumbnail" class="form-input" accept="image/*">
    </div>
    <div class="form-group">
      <label class="form-label">Tier</label>
      <select name="tier" class="form-select">
        <option value="free">Free</option>
        <option value="premium">Premium</option>
      </select>
    </div>
    <div style="display:flex;gap:12px;">
      <button type="submit" class="btn btn-primary">Create Series</button>
      <a href="/admin-panel/series/" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
