{% extends 'admin_panel/base_admin.html' %}
{% block admin_title %}Upload{% endblock %}
{% block topbar_title %}Upload Content{% endblock %}
{% block content %}
<div style="max-width:640px;">
<div class="panel">
  <div class="panel-head"><span class="panel-title">⬆ Upload New Content</span></div>
  <div class="panel-body">
    <form method="post" enctype="multipart/form-data" id="uploadForm">{% csrf_token %}
      <div class="fg">
        <label>Content Type</label>
        <select class="finput" name="content_type" id="ct" onchange="updateUI()">
          {% for v,l in content_types %}<option value="{{ v }}">{{ l }}</option>{% endfor %}
        </select>
      </div>
      <div class="fg"><label>Title *</label><input class="finput" name="title" required placeholder="Give your content a compelling title"></div>
      <div class="fg"><label>Description</label><textarea class="finput" name="description" rows="3" placeholder="Describe your content…"></textarea></div>
      <div class="fg" id="body-group" style="display:none;">
        <label>Blog Post Body</label>
        <textarea class="finput code" name="body" rows="10" style="min-height:200px;" placeholder="Full blog post content (HTML supported)…"></textarea>
      </div>
      <div class="form-grid">
        <div class="fg">
          <label>Tier</label>
          <select class="finput" name="tier">{% for v,l in tiers %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select>
        </div>
        <div class="fg">
          <label>Price (for pay-per-view)</label>
          <input class="finput" type="number" name="price" value="0" min="0" step="100" placeholder="0 = free or sub-only">
        </div>
      </div>
      <div class="fg" id="file-group">
        <label id="file-label">File * <span class="hint" style="font-weight:400;letter-spacing:0;" id="file-hint">Select file</span></label>
        <input class="finput" type="file" name="file" id="file-input">
      </div>
      <div class="fg">
        <label>Thumbnail <span class="hint" style="font-weight:400;letter-spacing:0;">JPG/PNG/WebP — strongly recommended</span></label>
        <input class="finput" type="file" name="thumbnail" accept="image/*">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:15px;">⬆ Upload & Publish</button>
    </form>
  </div>
</div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
const specs = {
  image: {accept:'image/*', hint:'JPG, PNG, WebP, GIF — max 50MB', label:'Image File', show:true},
  video: {accept:'video/*', hint:'MP4, WebM, MOV — max 500MB', label:'Video File', show:true},
  music: {accept:'audio/*', hint:'MP3, WAV, FLAC, AAC — max 100MB', label:'Audio File', show:true},
  blog:  {accept:'', hint:'', label:'', show:false},
};
function updateUI(){
  const ct = document.getElementById('ct').value;
  const s = specs[ct] || specs.image;
  const fi = document.getElementById('file-input');
  const fg = document.getElementById('file-group');
  const bg = document.getElementById('body-group');
  fi.accept = s.accept;
  document.getElementById('file-label').childNodes[0].textContent = s.show ? s.label + ' * ' : '';
  document.getElementById('file-hint').textContent = s.hint;
  fg.style.display = s.show ? 'block' : 'none';
  bg.style.display = ct === 'blog' ? 'block' : 'none';
  fi.required = s.show;
}
updateUI();
</script>
{% endblock %}
