{% extends 'admin_panel/base_admin.html' %}
{% block admin_title %}{{ action }} Workflow{% endblock %}
{% block topbar_title %}{{ action }} Workflow{% endblock %}
{% block content %}
<div style="max-width:620px;">
<form method="post">{% csrf_token %}
  <div class="panel">
    <div class="panel-header"><span class="panel-title">Workflow Settings</span></div>
    <div class="panel-body">
      <div class="form-group"><label class="form-label">Workflow Name</label><input class="form-control" name="name" required placeholder="e.g. Welcome Email Sequence"></div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" name="description" rows="2"></textarea></div>
      <div class="form-group"><label class="form-label">Trigger Event <span class="form-hint">When should this workflow fire?</span></label>
        <select class="form-control" name="trigger_event">
          {% for val, label in trigger_events %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-check"><input type="checkbox" name="is_active" checked> Workflow is active</label></div>
    </div>
  </div>
  <div style="display:flex;gap:12px;">
    <button type="submit" class="btn btn-primary">💾 Create Workflow</button>
    <a href="/admin-panel/automation/" class="btn btn-ghost">Cancel</a>
  </div>
</form>
</div>
{% endblock %}
