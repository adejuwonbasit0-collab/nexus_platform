{% extends 'base.html' %}
{% block title %}Log In — NEXUS{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;">
  <div style="width:100%;max-width:400px;">
    <div style="text-align:center;margin-bottom:28px;">
      <h1 style="font-size:26px;font-weight:800;margin-bottom:6px;">Welcome back</h1>
      <p style="color:var(--tx2);font-size:14px;">Sign in to your account</p>
    </div>
    {% if blocked %}
    <div class="alert alert-e"><span>⛔</span> Too many attempts. Please wait 5 minutes.</div>
    {% endif %}
    <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:28px;">
      <form method="post">{% csrf_token %}
        <div class="form-group"><label class="form-label">Username</label><input class="form-input" type="text" name="username" autofocus autocomplete="username" required placeholder="Your username"></div>
        <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" name="password" autocomplete="current-password" required placeholder="Your password"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;font-size:15px;margin-top:6px;">Sign In</button>
      </form>
    </div>
    <p style="text-align:center;margin-top:18px;font-size:13px;color:var(--tx2);">No account? <a href="/auth/register/" style="color:var(--ac);">Create one free</a></p>
  </div>
</div>
{% endblock %}
